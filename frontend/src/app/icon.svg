<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Space Navy -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0a1526" />
      <stop offset="100%" stop-color="#040914" />
    </radialGradient>
    
    <!-- Outer Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- 3D Bubble Gradients -->
    <radialGradient id="bubbleBase" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.3"/>
      <stop offset="85%" stop-color="#00f0ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0284c7" stop-opacity="1"/>
    </radialGradient>

    <radialGradient id="bubbleHighlight" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="bubbleBottomHighlight" cx="65%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark Background -->
  <rect width="256" height="256" rx="64" fill="url(#bgGrad)" />

  <!-- The 3D Sphere -->
  <g filter="url(#glow)">
    <!-- Base Color -->
    <circle cx="128" cy="128" r="85" fill="url(#bubbleBase)" />
    <!-- Bright Top Highlight for 3D glassy curve -->
    <circle cx="128" cy="128" r="85" fill="url(#bubbleHighlight)" />
    <!-- Bottom Reflection -->
    <circle cx="128" cy="128" r="85" fill="url(#bubbleBottomHighlight)" />
    <!-- Inner Sharp Highlight Edge for depth -->
    <circle cx="128" cy="128" r="85" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="140 300" stroke-dashoffset="100" opacity="0.7"/>
  </g>
</svg>
